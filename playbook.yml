- name: konfigurasi vm-frontend
  hosts: frontend
  become: true

  vars:

    ansible_users: vagrant
    ansible_password: vagrant

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
    
    - name: install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
    
    - name: Memastikan nginx berjalan
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: buat halaman html sederhana
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: | 
         "<html>
         <br><br><br>
         <div style="display: flex; justify-content: center; align-items: center;">
          <h1>Selamat Datang di vm-Frontend!</h1>
          </div>
          </body>
          </html>"
        owner: www-data
        group: www-data
        mode: '0644'
